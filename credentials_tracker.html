<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Credentials Tracker — 3rd CD Convention</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      font-size: 15px;
      background: #f5f5f5;
      color: #222;
    }

    /* ── Header ── */
    header {
      background: #003366;
      color: #fff;
      padding: 18px 28px 14px;
      display: flex;
      align-items: flex-end;
      gap: 18px;
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
    }
    header .subtitle {
      font-size: 14px;
      opacity: 0.82;
      padding-bottom: 2px;
    }

    /* ── Main layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 1px solid #d0d7e2;
      border-radius: 6px;
      padding: 22px 24px;
      margin-bottom: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .card h2 {
      font-size: 17px;
      color: #003366;
      margin-bottom: 18px;
      padding-bottom: 8px;
      border-bottom: 2px solid #003366;
    }

    /* ── Form grid ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 24px;
      align-items: start;
    }
    @media (max-width: 500px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .form-group.full-width {
      grid-column: 1 / -1;
    }
    .form-group.reason-row {
      grid-column: 1 / -1;
      max-width: 340px;
    }
    .form-group.notes-row {
      grid-column: 1 / -1;
    }
    .required-mark {
      color: #c0392b;
      font-weight: 700;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: #003366;
      letter-spacing: 0.02em;
    }
    label .optional {
      font-weight: 400;
      color: #666;
      font-size: 12px;
    }

    input[type="text"],
    select,
    textarea {
      font-family: Arial, sans-serif;
      font-size: 15px;
      padding: 10px 12px;
      border: 1.5px solid #aab4c4;
      border-radius: 4px;
      color: #222;
      background: #fff;
      width: 100%;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #003366;
      box-shadow: 0 0 0 3px rgba(0,51,102,0.12);
    }
    input.error, select.error, textarea.error {
      border-color: #c0392b;
      background: #fff6f6;
    }
    textarea {
      resize: vertical;
      min-height: 70px;
      max-height: 160px;
    }
    select option[value=""] { color: #888; }

    /* disabled / hidden To ID */
    input.field-disabled {
      background: #eef0f4;
      color: #999;
      border-color: #d0d7e2;
      cursor: not-allowed;
    }

    .error-msg {
      font-size: 12px;
      color: #c0392b;
      min-height: 16px;
      margin-top: 2px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 11px 22px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
      gap: 7px;
    }
    .btn-primary {
      background: #003366;
      color: #fff;
    }
    .btn-primary:hover { background: #004080; }
    .btn-secondary {
      background: #e8ecf2;
      color: #003366;
    }
    .btn-secondary:hover { background: #d4dcea; }
    .btn-danger {
      background: #c0392b;
      color: #fff;
      font-size: 13px;
      padding: 7px 13px;
      font-weight: 600;
    }
    .btn-danger:hover { background: #a93226; }
    .btn-sm {
      font-size: 13px;
      padding: 6px 14px;
    }

    .form-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    /* ── Entry count badge ── */
    .count-badge {
      background: #003366;
      color: #fff;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 13px;
      font-weight: 700;
      margin-left: auto;
    }

    /* ── Table ── */
    .table-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .table-toolbar h2 {
      margin: 0;
      padding: 0;
      border: none;
      font-size: 17px;
      color: #003366;
      flex: 1;
    }

    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead th {
      background: #003366;
      color: #fff;
      text-align: left;
      padding: 11px 12px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #e0e6ef;
    }
    tbody tr:nth-child(even) { background: #f7f9fc; }
    tbody tr:hover { background: #edf2fb; }
    tbody td {
      padding: 10px 12px;
      vertical-align: middle;
    }
    .td-datetime { white-space: nowrap; font-size: 13px; color: #555; }
    .td-id { font-family: "Courier New", monospace; font-weight: 700; font-size: 14px; }
    .td-id-delegate { color: #003366; }
    .td-id-alternate { color: #5a3090; }
    .td-reason { font-weight: 600; }
    .reason-transfer   { color: #1a6b3c; }
    .reason-reclaiming { color: #7a4e00; }
    .reason-surrender  { color: #c0392b; }
    .td-notes { color: #444; font-size: 13px; max-width: 220px; word-break: break-word; }


    .empty-state {
      text-align: center;
      color: #888;
      padding: 36px 20px;
      font-size: 15px;
      font-style: italic;
    }

    /* ── Print styles ── */
    @media print {
      body { background: #fff; font-size: 12px; }
      header { background: #003366 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; padding: 10px 16px; }
      header h1 { font-size: 17px; }
      .no-print, .form-actions, .card:first-of-type { display: none !important; }
      main { padding: 0; max-width: 100%; }
      .card { box-shadow: none; border: none; padding: 10px 0; }
      .table-toolbar .btn { display: none; }
      thead th {
        background: #003366 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .btn-danger { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Credentials Tracker</h1>
    <div class="subtitle">3rd CD Democratic Convention &mdash; May 2, 2026</div>
  </div>
</header>

<main>

  <!-- ── Entry Form ── -->
  <div class="card no-print" id="formCard">
    <h2>Log Credential Change</h2>

    <div class="form-grid">

      <!-- Row 1: Reason -->
      <div class="form-group reason-row">
        <label for="reason">Reason <span class="required-mark">*</span></label>
        <select id="reason">
          <option value="">&#8212; Select from Below &#8212;</option>
          <option value="Arriving">Arriving</option>
          <option value="Transfer">Transfer</option>
          <option value="Transfer-Preferred Alternate">Transfer-Preferred Alternate</option>
          <option value="Reclaiming">Reclaiming</option>
          <option value="Surrender">Surrender</option>
        </select>
        <div class="error-msg" id="reasonError"></div>
      </div>

      <!-- Row 2: From ID & To ID -->
      <div class="form-group">
        <label for="fromId">From ID <span class="optional">(leaving floor)</span></label>
        <input type="text" id="fromId" placeholder="Select a reason first" maxlength="7" autocomplete="off" disabled class="field-disabled" />
        <div class="error-msg" id="fromIdError"></div>
      </div>

      <div class="form-group">
        <label for="toId">To ID <span class="optional">(taking seat)</span></label>
        <input type="text" id="toId" placeholder="Select a reason first" maxlength="7" autocomplete="off" disabled class="field-disabled" />
        <div class="error-msg" id="toIdError"></div>
      </div>

      <!-- Row 3: Notes -->
      <div class="form-group notes-row">
        <label for="notes">Notes <span class="optional">(optional)</span></label>
        <textarea id="notes" placeholder="e.g. delegate returning at 2pm, alternate already seated Row 3" rows="3" autocomplete="off"></textarea>
      </div>

    </div><!-- /form-grid -->

    <div class="form-actions">
      <button class="btn btn-primary" id="addBtn" onclick="addEntry()">
        &#43; Add Entry
      </button>
      <button class="btn btn-secondary btn-sm" onclick="clearForm()">Clear</button>
      <span id="successMsg" style="color:#1a6b3c;font-weight:700;font-size:14px;display:none;">&#10003; Entry added</span>
    </div>
  </div><!-- /formCard -->


  <!-- ── Log Table ── -->
  <div class="card">
    <div class="table-toolbar">
      <h2>Credentials Log</h2>
      <span class="count-badge no-print" id="entryCount">0 entries</span>
      <button class="btn btn-secondary btn-sm no-print" onclick="exportCSV()">&#8595; Export CSV</button>
      <button class="btn btn-secondary btn-sm no-print" onclick="printTable()">&#128438; Print</button>
    </div>

    <div class="table-scroll">
      <table id="logTable">
        <thead>
          <tr>
            <th>Date / Time</th>
            <th>From ID</th>
            <th>To ID</th>
            <th>Reason</th>
            <th>Notes</th>
            <th class="no-print">Delete</th>
          </tr>
        </thead>
        <tbody id="logBody">
          <tr id="emptyRow">
            <td colspan="6" class="empty-state">No entries yet. Use the form above to log credential changes.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div><!-- /log card -->

</main>

<script>
  // ── In-memory log ──
  var log = [];

  // ── ID validation pattern: D-6### or A-6###
  var idPattern = /^[DA]-6\d{3}$/;

  // ── Which fields are required by reason? ──
  function fromIdRequired() {
    var r = document.getElementById('reason').value;
    // Arriving: only To ID needed (person coming in, no "from")
    return r === 'Transfer' || r === 'Transfer-Preferred Alternate' || r === 'Reclaiming' || r === 'Surrender';
  }
  function toIdRequired() {
    var r = document.getElementById('reason').value;
    // Surrender: no recipient
    return r === 'Arriving' || r === 'Transfer' || r === 'Transfer-Preferred Alternate' || r === 'Reclaiming';
  }

  // ── Lock / unlock helpers ──
  function lockField(inputEl, errEl, placeholderText) {
    inputEl.disabled = true;
    inputEl.value = '';
    inputEl.placeholder = placeholderText || '';
    inputEl.classList.add('field-disabled');
    inputEl.classList.remove('error');
    if (errEl) errEl.textContent = '';
  }
  function unlockField(inputEl, placeholderText) {
    inputEl.disabled = false;
    inputEl.placeholder = placeholderText || '';
    inputEl.classList.remove('field-disabled');
  }

  // ── Master field-state updater ──
  function updateFieldStates() {
    var r       = document.getElementById('reason').value;
    var fromEl  = document.getElementById('fromId');
    var fromErr = document.getElementById('fromIdError');
    var toEl    = document.getElementById('toId');
    var toErr   = document.getElementById('toIdError');

    if (r === '') {
      // Nothing selected — lock both
      lockField(fromEl, fromErr, 'Select a reason first');
      lockField(toEl,   toErr,   'Select a reason first');
    } else if (r === 'Arriving') {
      // Arriving: only To ID (the person checking in); no From
      lockField(fromEl, fromErr, 'N/A — Arriving');
      unlockField(toEl, 'D-6001 or A-6001');
    } else if (r === 'Transfer' || r === 'Transfer-Preferred Alternate' || r === 'Reclaiming') {
      // Both required
      unlockField(fromEl, 'D-6001 or A-6001');
      unlockField(toEl,   'D-6001 or A-6001');
    } else if (r === 'Surrender') {
      // From required, To stays locked
      unlockField(fromEl, 'D-6001 or A-6001');
      lockField(toEl, toErr, 'N/A — Surrender');
    }
  }

  // ── Wire up Reason change ──
  document.getElementById('reason').addEventListener('change', function() {
    document.getElementById('reason').classList.remove('error');
    document.getElementById('reasonError').textContent = '';
    updateFieldStates();
    // Focus the first open field
    var toEl   = document.getElementById('toId');
    var fromEl = document.getElementById('fromId');
    setTimeout(function() {
      if (!fromEl.disabled) { fromEl.focus(); }
      else if (!toEl.disabled) { toEl.focus(); }
    }, 0);
  });

  // Run once on load — both fields start locked
  updateFieldStates();

  // ── Format date/time ──
  function formatDateTime(d) {
    var month = d.getMonth() + 1;
    var day   = d.getDate();
    var year  = d.getFullYear();
    var hours = d.getHours();
    var mins  = d.getMinutes();
    var ampm  = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    if (hours === 0) hours = 12;
    mins = mins < 10 ? '0' + mins : String(mins);
    return month + '/' + day + '/' + year + ' ' + hours + ':' + mins + ' ' + ampm;
  }

  // ── Validate a single ID field ──
  function validateId(val, fieldId, errId, required) {
    var field = document.getElementById(fieldId);
    var err   = document.getElementById(errId);
    val = val.trim().toUpperCase();

    if (!required && val === '') {
      field.classList.remove('error');
      err.textContent = '';
      return true;
    }
    if (required && val === '') {
      field.classList.add('error');
      err.textContent = 'Required for ' + document.getElementById('reason').value + '.';
      return false;
    }
    if (!idPattern.test(val)) {
      field.classList.add('error');
      err.textContent = 'Format must be D-6### or A-6### (e.g. D-6042, A-6017).';
      return false;
    }
    field.classList.remove('error');
    err.textContent = '';
    return true;
  }

  // ── Add entry ──
  function addEntry() {
    var fromVal   = document.getElementById('fromId').value.trim().toUpperCase();
    var toVal     = document.getElementById('toId').value.trim().toUpperCase();
    var reasonVal = document.getElementById('reason').value;
    var notesVal  = document.getElementById('notes').value.trim();

    // Validate reason selected
    var reasonOk = true;
    if (!reasonVal) {
      document.getElementById('reason').classList.add('error');
      document.getElementById('reasonError').textContent = 'Please select a reason before logging an entry.';
      reasonOk = false;
    }

    var fromOk = !reasonVal ? false : validateId(fromVal, 'fromId', 'fromIdError', fromIdRequired());
    var toOk   = !reasonVal ? false : validateId(toVal,   'toId',   'toIdError',   toIdRequired());

    if (!reasonOk || !fromOk || !toOk) return;

    var entry = {
      id:       Date.now(),
      datetime: formatDateTime(new Date()),
      fromId:   fromIdRequired() ? fromVal : '',
      toId:     toIdRequired()   ? toVal   : '',
      reason:   reasonVal,
      notes:    notesVal
    };

    log.unshift(entry); // newest first
    renderTable();
    clearForm(true);
    showSuccess();
  }

  // ── Show a brief "Entry added" confirmation ──
  var successTimer;
  function showSuccess() {
    var msg = document.getElementById('successMsg');
    msg.style.display = 'inline';
    clearTimeout(successTimer);
    successTimer = setTimeout(function() { msg.style.display = 'none'; }, 2500);
  }

  // ── Clear form ──
  // keepReason = true when called after successful entry (keep reason, just clear IDs & notes)
  function clearForm(keepReason) {
    if (!keepReason) {
      document.getElementById('reason').value = '';
      document.getElementById('reason').classList.remove('error');
      document.getElementById('reasonError').textContent = '';
    }
    // clear errors
    ['fromId','toId'].forEach(function(id) {
      document.getElementById(id).classList.remove('error');
    });
    document.getElementById('fromIdError').textContent = '';
    document.getElementById('toIdError').textContent   = '';
    document.getElementById('notes').value = '';
    updateFieldStates();
    // Focus reason if cleared, otherwise focus From ID
    if (!keepReason) {
      document.getElementById('reason').focus();
    } else {
      var fromEl = document.getElementById('fromId');
      if (!fromEl.disabled) fromEl.focus();
    }
  }

  // ── Escape HTML ──
  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ── ID class helper ──
  function idClass(id) {
    if (!id) return '';
    return id.charAt(0) === 'D' ? 'td-id td-id-delegate' : 'td-id td-id-alternate';
  }

  // ── Reason class helper ──
  function reasonClass(r) {
    if (r === 'Transfer')   return 'td-reason reason-transfer';
    if (r === 'Reclaiming') return 'td-reason reason-reclaiming';
    if (r === 'Surrender')  return 'td-reason reason-surrender';
    return 'td-reason';
  }

  // ── Render table ──
  function renderTable() {
    var tbody = document.getElementById('logBody');
    var badge = document.getElementById('entryCount');
    badge.textContent = log.length + (log.length === 1 ? ' entry' : ' entries');

    if (log.length === 0) {
      tbody.innerHTML = '<tr id="emptyRow"><td colspan="6" class="empty-state">No entries yet. Use the form above to log credential changes.</td></tr>';
      return;
    }

    var rows = log.map(function(e) {
      return '<tr>' +
        '<td class="td-datetime">' + esc(e.datetime) + '</td>' +
        '<td class="' + idClass(e.fromId) + '">' + esc(e.fromId) + '</td>' +
        '<td class="' + (e.toId ? idClass(e.toId) : '') + '">' + esc(e.toId || '—') + '</td>' +
        '<td class="' + reasonClass(e.reason) + '">' + esc(e.reason) + '</td>' +
        '<td class="td-notes">' + esc(e.notes || '') + '</td>' +
        '<td class="no-print"><button class="btn btn-danger" onclick="deleteEntry(' + e.id + ')">Delete</button></td>' +
      '</tr>';
    });
    tbody.innerHTML = rows.join('');
  }

  // ── Delete entry ──
  function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    log = log.filter(function(e) { return e.id !== id; });
    renderTable();
  }

  // ── Export CSV ──
  function exportCSV() {
    if (log.length === 0) {
      alert('No entries to export.');
      return;
    }
    var header = ['Date/Time', 'From ID', 'To ID', 'Reason', 'Notes'];
    var rows = log.map(function(e) {
      return [e.datetime, e.fromId, e.toId || '', e.reason, e.notes || ''].map(csvCell).join(',');
    });
    var csv = [header.map(csvCell).join(',')].concat(rows).join('\r\n');

    var now = new Date();
    var mm  = String(now.getMonth() + 1).padStart(2,'0');
    var dd  = String(now.getDate()).padStart(2,'0');
    var yy  = now.getFullYear();
    var filename = 'credentials_log_' + yy + mm + dd + '.csv';

    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(function() {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);
  }

  function csvCell(val) {
    val = String(val);
    if (val.indexOf(',') >= 0 || val.indexOf('"') >= 0 || val.indexOf('\n') >= 0) {
      return '"' + val.replace(/"/g, '""') + '"';
    }
    return val;
  }

  // ── Print (table only) ──
  function printTable() {
    window.print();
  }

  // ── Live inline validation on blur ──
  document.getElementById('fromId').addEventListener('blur', function() {
    if (!this.disabled) validateId(this.value.trim().toUpperCase(), 'fromId', 'fromIdError', fromIdRequired());
  });
  document.getElementById('fromId').addEventListener('input', function() {
    var pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    this.setSelectionRange(pos, pos);
  });
  document.getElementById('toId').addEventListener('blur', function() {
    if (!this.disabled && toIdRequired()) {
      validateId(this.value.trim().toUpperCase(), 'toId', 'toIdError', true);
    }
  });
  document.getElementById('toId').addEventListener('input', function() {
    var pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    this.setSelectionRange(pos, pos);
  });

  // ── Allow Enter to submit ──
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.activeElement !== document.getElementById('notes')) {
      var tag = document.activeElement.tagName;
      if (tag === 'INPUT' || tag === 'SELECT') {
        addEntry();
      }
    }
  });
</script>
</body>
</html>
